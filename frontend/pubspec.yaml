name: frontend
description: "Hear Me Out — Türk İşaret Dili çeviri mobil uygulaması."
# Özel paket, pub.dev'e yayınlanmaz.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.1
  google_fonts: ^8.0.2
  camera: ^0.12.0+1
  tflite_flutter: ^0.12.1
  permission_handler: ^12.0.1
  google_mlkit_pose_detection: ^0.14.1
  hand_detection: ^2.0.8
  opencv_dart: ^2.2.1+4        # hand_detection Mat dönüşümü için gerekli

  # ── Ses & Konuşma ──────────────────────────────────────────────────────────
  flutter_tts: ^4.2.0          # İşaret → Metin: Türkçe sesli okuma
  # TODO: Gerçek STT implementasyonu eklendiğinde aktifleştirilecek
  speech_to_text: ^7.0.0       # Metin → İşaret: sesli giriş (TranslatorScreen)

  # ── Paylaşım ───────────────────────────────────────────────────────────────
  share_plus: ^10.1.4          # Cümleyi sistem paylaşım menüsüne ilet

  # ── Kalıcı Depolama ────────────────────────────────────────────────────────
  shared_preferences: ^2.3.2   # Ayarlar + onboarding_completed flag

  # ── Video ──────────────────────────────────────────────────────────────────
  video_player: ^2.9.3         # Metin → İşaret: TİD video oynatıcı

  # ── Animasyon & UI ─────────────────────────────────────────────────────────
  shimmer: ^3.0.0              # Yükleme iskelet efektleri
  flutter_animate: ^4.5.2      # Proje geneli animasyonlar
  url_launcher: ^6.3.2
  http: ^1.3.0                  # Backend API çağrıları

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.7

# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/models/
    - assets/images/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
